name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: TYPO3 ${{ matrix.typo3 }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        typo3: ['^13.4', '^14.0']

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: t3_func
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Constrain TYPO3 version
        run: |
          composer require --no-update --dev \
            "typo3/cms-core:${{ matrix.typo3 }}" \
            "typo3/cms-backend:${{ matrix.typo3 }}"

      - name: Install dependencies
        run: composer update --no-progress --prefer-dist

      - name: Coding standards
        run: composer ci:php:cs

      - name: PHPStan (max)
        run: composer ci:php:stan

      - name: Psalm
        run: composer ci:php:psalm

      - name: Unit tests
        run: composer ci:php:unit

      - name: Functional tests
        run: composer ci:php:functional
        env:
          typo3DatabaseDriver: mysqli
          typo3DatabaseHost: 127.0.0.1
          typo3DatabasePort: 3306
          typo3DatabaseName: t3_func
          typo3DatabaseUsername: root
          typo3DatabasePassword: root
